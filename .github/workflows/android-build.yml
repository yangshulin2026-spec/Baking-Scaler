name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android APK
        run: |
          cd android
          # If wrapper is corrupt, try to use system gradle to build or fix it
          if ! jar tf gradle/wrapper/gradle-wrapper.jar > /dev/null 2>&1; then
            echo "Gradle wrapper is corrupt, attempting to build with system gradle..."
            gradle assembleDebug
          else
            chmod +x gradlew
            ./gradlew assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: baking-scaler-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
