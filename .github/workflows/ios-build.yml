name: Build iOS App

on:
  push:
    branches: [ main, master ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Capacitor Sync
        run: |
          npx cap add ios
          npx cap sync ios

      - name: Build iOS App (Xcode)
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -derivedDataPath build \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO

      - name: Zip App for Download
        run: |
          cd build/Build/Products/Release-iphoneos
          zip -r BakingScaler.zip App.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BakingScaler-iOS-App
          path: build/Build/Products/Release-iphoneos/BakingScaler.zip
